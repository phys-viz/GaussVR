<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>VR Cube</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a1a; overflow: hidden; font-family: sans-serif; }
    #vr-btn {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      padding: 14px 32px;
      background: #0d1b2a;
      color: #4fc3f7;
      border: 2px solid #4fc3f7;
      border-radius: 8px;
      font-size: 18px;
      cursor: pointer;
      letter-spacing: 1px;
    }
    #vr-btn:hover { background: #4fc3f7; color: #0a0a1a; }
    #info {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: #888;
      font-size: 14px;
      text-align: center;
    }
  </style>
</head>
<body>
<div id="info">Point controller near cube · Pull trigger to grab · Move around · Release to drop</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
  // ── Scene ──────────────────────────────────────────────────────────────────
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a0a1a);

  const camera = new THREE.PerspectiveCamera(70, innerWidth / innerHeight, 0.01, 50);
  camera.position.set(0, 1.6, 2.5);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(devicePixelRatio);
  renderer.setSize(innerWidth, innerHeight);
  renderer.xr.enabled = true;
  document.body.appendChild(renderer.domElement);

  // ── Lighting ───────────────────────────────────────────────────────────────
  scene.add(new THREE.AmbientLight(0xffffff, 0.5));
  const sun = new THREE.DirectionalLight(0xffffff, 1.2);
  sun.position.set(2, 4, 2);
  scene.add(sun);

  // ── Floor ─────────────────────────────────────────────────────────────────
  const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(10, 10),
    new THREE.MeshStandardMaterial({ color: 0x111122 })
  );
  floor.rotation.x = -Math.PI / 2;
  scene.add(floor);
  scene.add(new THREE.GridHelper(10, 20, 0x223344, 0x1a2233));

  // ── The Cube ───────────────────────────────────────────────────────────────
  const cubeMat = new THREE.MeshStandardMaterial({
    color: 0x4fc3f7,
    metalness: 0.2,
    roughness: 0.4,
  });
  const cube = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.3, 0.3), cubeMat);
  cube.position.set(0, 1.3, -0.8);
  scene.add(cube);

  // ── Grab state ────────────────────────────────────────────────────────────
  const raycaster = new THREE.Raycaster();
  let grabbingController = null;

  function tryGrab(controller) {
    if (grabbingController) return;
    // Cast a ray from the controller forward
    const origin = new THREE.Vector3();
    const direction = new THREE.Vector3();
    controller.getWorldPosition(origin);
    controller.getWorldDirection(direction);
    raycaster.set(origin, direction);
    const hits = raycaster.intersectObject(cube);
    if (hits.length > 0) {
      grabbingController = controller;
      cubeMat.color.set(0xffb74d); // orange when held
      controller.attach(cube);
    }
  }

  function release(controller) {
    if (grabbingController !== controller) return;
    scene.attach(cube);
    cubeMat.color.set(0x4fc3f7);   // back to blue
    grabbingController = null;
  }

  // ── Controllers ───────────────────────────────────────────────────────────
  for (let i = 0; i < 2; i++) {
    const ctrl = renderer.xr.getController(i);
    scene.add(ctrl);

    // Simple controller body
    const body = new THREE.Mesh(
      new THREE.CylinderGeometry(0.012, 0.018, 0.12, 10),
      new THREE.MeshStandardMaterial({ color: 0xeeeeee })
    );
    body.rotation.x = -Math.PI / 2;
    ctrl.add(body);

    // Ray pointer
    const ray = new THREE.Line(
      new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(0, 0, 0),
        new THREE.Vector3(0, 0, -1)
      ]),
      new THREE.LineBasicMaterial({ color: 0x4fc3f7, transparent: true, opacity: 0.5 })
    );
    ray.scale.z = 1.5;
    ctrl.add(ray);

    ctrl.addEventListener('selectstart', () => tryGrab(ctrl));
    ctrl.addEventListener('selectend',   () => release(ctrl));
  }

  // ── Highlight when controller is near ─────────────────────────────────────
  const cp = new THREE.Vector3();

  const origin = new THREE.Vector3();
  const direction = new THREE.Vector3();

  function updateHighlight() {
    if (grabbingController) return;
    let hit = false;
    for (let i = 0; i < 2; i++) {
      const ctrl = renderer.xr.getController(i);
      ctrl.getWorldPosition(origin);
      ctrl.getWorldDirection(direction);
      raycaster.set(origin, direction);
      if (raycaster.intersectObject(cube).length > 0) { hit = true; break; }
    }
    cubeMat.emissive.set(hit ? 0x1a3a4a : 0x000000);
    cubeMat.emissiveIntensity = hit ? 0.6 : 0;
  }

  // ── Gentle idle spin ──────────────────────────────────────────────────────
  renderer.setAnimationLoop(() => {
    if (!grabbingController) {
      cube.rotation.y += 0.008;
    }
    updateHighlight();
    renderer.render(scene, camera);
  });

  // ── VR Button ─────────────────────────────────────────────────────────────
  const btn = document.createElement('button');
  btn.id = 'vr-btn';
  btn.textContent = 'Enter VR';
  document.body.appendChild(btn);

  btn.addEventListener('click', async () => {
    if (!navigator.xr) {
      btn.textContent = '⚠ WebXR not available';
      return;
    }
    const ok = await navigator.xr.isSessionSupported('immersive-vr').catch(() => false);
    if (!ok) {
      btn.textContent = '⚠ VR not supported here';
      return;
    }
    const session = await navigator.xr.requestSession('immersive-vr', {
      optionalFeatures: ['local-floor', 'bounded-floor']
    });
    renderer.xr.setSession(session);
    btn.textContent = 'Exit VR';
    session.addEventListener('end', () => { btn.textContent = 'Enter VR'; });
  });

  // ── Resize ────────────────────────────────────────────────────────────────
  window.addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });
</script>
</body>
</html>
