<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>VR Gauss's Law</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a1a; overflow: hidden; }
  </style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a0a1a);
  const camera = new THREE.PerspectiveCamera(70, innerWidth / innerHeight, 0.01, 50);
  camera.position.set(0, 1.6, 2.5);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(devicePixelRatio);
  renderer.setSize(innerWidth, innerHeight);
  renderer.xr.enabled = true;
  document.body.appendChild(renderer.domElement);

  // Player rig — we move/rotate this instead of the camera directly
  const player = new THREE.Group();
  player.add(camera);
  scene.add(player);

  scene.add(new THREE.AmbientLight(0xffffff, 0.6));
  const sun = new THREE.DirectionalLight(0xffffff, 1.0);
  sun.position.set(2, 4, 2);
  scene.add(sun);

  const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(10, 10),
    new THREE.MeshStandardMaterial({ color: 0x111122 })
  );
  floor.rotation.x = -Math.PI / 2;
  scene.add(floor);
  scene.add(new THREE.GridHelper(10, 20, 0x223344, 0x1a2233));

  // Cube
  const CUBE_SIZE = 0.8;
  const cubeCenter = new THREE.Vector3(0, 1.4, -0.8);
  const wireframe = new THREE.LineSegments(
    new THREE.EdgesGeometry(new THREE.BoxGeometry(CUBE_SIZE, CUBE_SIZE, CUBE_SIZE)),
    new THREE.LineBasicMaterial({ color: 0x4fc3f7, transparent: true, opacity: 0.8 })
  );
  wireframe.position.copy(cubeCenter);
  scene.add(wireframe);
  const cubeFaces = new THREE.Mesh(
    new THREE.BoxGeometry(CUBE_SIZE, CUBE_SIZE, CUBE_SIZE),
    new THREE.MeshStandardMaterial({ color: 0x4fc3f7, transparent: true, opacity: 0.07, side: THREE.DoubleSide, depthWrite: false })
  );
  cubeFaces.position.copy(cubeCenter);
  scene.add(cubeFaces);

  // Charge
  const chargeMat = new THREE.MeshStandardMaterial({ color: 0xff4444, emissive: 0xff2222, emissiveIntensity: 0.4 });
  const charge = new THREE.Mesh(new THREE.SphereGeometry(0.09, 32, 32), chargeMat);
  charge.position.copy(cubeCenter);
  scene.add(charge);
  const chargeLight = new THREE.PointLight(0xff4444, 1.2, 3);
  scene.add(chargeLight);

  // Arrows
  function makeArrow() {
    const group = new THREE.Group();
    const mat = new THREE.MeshStandardMaterial({ color: 0x4fc3f7, emissive: 0x4fc3f7, emissiveIntensity: 0.3 });
    const shaft = new THREE.Mesh(new THREE.CylinderGeometry(0.006, 0.006, 0.18, 8), mat.clone());
    shaft.position.y = 0.09;
    group.add(shaft);
    const head = new THREE.Mesh(new THREE.ConeGeometry(0.02, 0.06, 8), mat.clone());
    head.position.y = 0.21;
    group.add(head);
    return group;
  }

  const GRID = 3;
  const halfSize = CUBE_SIZE / 2;
  const step = CUBE_SIZE / (GRID + 1);
  const faceConfigs = [
    { normal: new THREE.Vector3( 1,0,0), up: new THREE.Vector3(0,1,0), right: new THREE.Vector3(0,0,-1) },
    { normal: new THREE.Vector3(-1,0,0), up: new THREE.Vector3(0,1,0), right: new THREE.Vector3(0,0, 1) },
    { normal: new THREE.Vector3(0, 1,0), up: new THREE.Vector3(0,0,-1), right: new THREE.Vector3(1,0,0) },
    { normal: new THREE.Vector3(0,-1,0), up: new THREE.Vector3(0,0, 1), right: new THREE.Vector3(1,0,0) },
    { normal: new THREE.Vector3(0,0, 1), up: new THREE.Vector3(0,1,0), right: new THREE.Vector3(1,0,0) },
    { normal: new THREE.Vector3(0,0,-1), up: new THREE.Vector3(0,1,0), right: new THREE.Vector3(-1,0,0) },
  ];
  const faceArrows = [];
  faceConfigs.forEach(({ normal, up, right }) => {
    for (let i = 1; i <= GRID; i++) {
      for (let j = 1; j <= GRID; j++) {
        const u = (i - (GRID+1)/2) * step;
        const v = (j - (GRID+1)/2) * step;
        const localPos = normal.clone().multiplyScalar(halfSize).addScaledVector(up, u).addScaledVector(right, v);
        const arrow = makeArrow();
        scene.add(arrow);
        faceArrows.push({ mesh: arrow, localPos, normal: normal.clone() });
      }
    }
  });

  const _up = new THREE.Vector3(0,1,0);
  const chargeWorldPos = new THREE.Vector3();

  function updateArrows() {
    // *** Use getWorldPosition so it works correctly when charge is grabbed ***
    charge.getWorldPosition(chargeWorldPos);
    chargeLight.position.copy(chargeWorldPos);

    faceArrows.forEach(({ mesh, localPos, normal }) => {
      const worldPos = cubeCenter.clone().add(localPos);
      mesh.position.copy(worldPos);
      const dist = worldPos.distanceTo(chargeWorldPos);
      const strength = Math.min(1.0, 0.04 / (dist * dist));
      mesh.scale.setScalar(0.5 + strength * 1.5);
      const intensity = Math.min(1.0, strength * 3);
      mesh.children.forEach(child => {
        child.material.emissiveIntensity = 0.1 + intensity * 0.8;
        child.material.color.setRGB(intensity * 0.3 + 0.1, intensity * 0.6 + 0.3, 1.0);
      });
      const q = new THREE.Quaternion().setFromUnitVectors(_up, normal);
      mesh.setRotationFromQuaternion(q);
    });
  }
  updateArrows();

  // Grab
  const GRAB_RADIUS = 0.5;
  let grabbingController = null;
  const ctrlPos = new THREE.Vector3();
  const controllers = [];

  for (let i = 0; i < 2; i++) {
    const ctrl = renderer.xr.getController(i);
    player.add(ctrl); // attach to player rig so they move with locomotion
    controllers.push(ctrl);

    const body = new THREE.Mesh(
      new THREE.CylinderGeometry(0.012, 0.018, 0.12, 10),
      new THREE.MeshStandardMaterial({ color: 0xdddddd })
    );
    body.rotation.x = -Math.PI / 2;
    ctrl.add(body);

    ctrl.addEventListener('selectstart', () => {
      if (grabbingController) return;
      ctrl.getWorldPosition(ctrlPos);
      if (ctrlPos.distanceTo(charge.position) < GRAB_RADIUS) {
        grabbingController = ctrl;
        chargeMat.emissiveIntensity = 1.0;
        ctrl.attach(charge);
      }
    });
    ctrl.addEventListener('selectend', () => {
      if (grabbingController !== ctrl) return;
      scene.attach(charge);
      chargeMat.emissiveIntensity = 0.4;
      grabbingController = null;
    });
  }

  function updateProximity() {
    if (grabbingController) return;
    let near = false;
    controllers.forEach(ctrl => {
      ctrl.getWorldPosition(ctrlPos);
      if (ctrlPos.distanceTo(charge.position) < GRAB_RADIUS) near = true;
    });
    chargeMat.emissiveIntensity = near ? 0.9 : 0.4;
  }

  // ── Locomotion: left stick = move, right stick = snap turn ────────────────
  const SNAP_ANGLE = Math.PI / 6; // 30 degrees
  let snapCooled = true;
  const moveDir = new THREE.Vector3();
  const camDir  = new THREE.Vector3();

  function handleLocomotion() {
    const session = renderer.xr.getSession();
    if (!session) return;
    for (const source of session.inputSources) {
      if (!source.gamepad) continue;
      const axes = source.gamepad.axes;
      if (axes.length < 4) continue;
      const lx = axes[2], ly = axes[3]; // left stick on most controllers is axes 2,3

      if (source.handedness === 'left') {
        // Smooth movement — walk forward/back and strafe
        if (Math.abs(lx) > 0.1 || Math.abs(ly) > 0.1) {
          camera.getWorldDirection(camDir);
          camDir.y = 0;
          camDir.normalize();
          const right = new THREE.Vector3().crossVectors(camDir, new THREE.Vector3(0,1,0));
          moveDir.set(0,0,0)
            .addScaledVector(camDir, -ly * 0.02)
            .addScaledVector(right,   lx * 0.02);
          player.position.add(moveDir);
        }
      }

      if (source.handedness === 'right') {
        // Snap turn on right stick
        if (Math.abs(lx) > 0.6 && snapCooled) {
          player.rotation.y -= Math.sign(lx) * SNAP_ANGLE;
          snapCooled = false;
        }
        if (Math.abs(lx) < 0.3) snapCooled = true;
      }
    }
  }

  // Render loop
  renderer.setAnimationLoop(() => {
    handleLocomotion();
    updateArrows();
    updateProximity();
    renderer.render(scene, camera);
  });

  // VR Button
  const btn = document.createElement('button');
  Object.assign(btn.style, {
    position:'absolute', bottom:'30px', left:'50%', transform:'translateX(-50%)',
    padding:'14px 32px', background:'#0d1b2a', color:'#4fc3f7',
    border:'2px solid #4fc3f7', borderRadius:'8px', fontSize:'18px',
    cursor:'pointer', letterSpacing:'1px'
  });
  btn.textContent = 'Enter VR';
  document.body.appendChild(btn);
  btn.addEventListener('click', async () => {
    if (!navigator.xr) { btn.textContent = '⚠ WebXR not available'; return; }
    const ok = await navigator.xr.isSessionSupported('immersive-vr').catch(() => false);
    if (!ok) { btn.textContent = '⚠ VR not supported'; return; }
    const session = await navigator.xr.requestSession('immersive-vr', {
      optionalFeatures: ['local-floor', 'bounded-floor']
    });
    renderer.xr.setSession(session);
    btn.textContent = 'Exit VR';
    session.addEventListener('end', () => { btn.textContent = 'Enter VR'; });
  });

  window.addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });
</script>
</body>
</html>
