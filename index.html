<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gauss VR</title>
  <link rel="manifest" href="manifest.json">
  <style>* { margin:0; padding:0; box-sizing:border-box; } body { background:#0a0a1a; overflow:hidden; }</style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a0a1a);
  const camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.01, 50);
  camera.position.set(0, 1.6, 2.5);
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(devicePixelRatio);
  renderer.setSize(innerWidth, innerHeight);
  renderer.xr.enabled = true;
  document.body.appendChild(renderer.domElement);

  // ── Audio ──────────────────────────────────────────────────────────────────
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  function playPop(freq, duration) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(freq * 0.3, audioCtx.currentTime + duration);
    gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.start(); osc.stop(audioCtx.currentTime + duration);
  }

  function playWhoosh() {
    const bufSize = audioCtx.sampleRate * 0.3;
    const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) data[i] = (Math.random()*2-1) * (1 - i/bufSize);
    const src = audioCtx.createBufferSource();
    const filter = audioCtx.createBiquadFilter();
    const gain = audioCtx.createGain();
    filter.type = 'bandpass'; filter.frequency.value = 800;
    src.buffer = buf;
    src.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
    gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
    src.start();
  }

  // ── Haptics ────────────────────────────────────────────────────────────────
  function haptic(controller, intensity, duration) {
    const session = renderer.xr.getSession();
    if (!session) return;
    for (const source of session.inputSources) {
      const ctrl = renderer.xr.getController(source.handedness === 'left' ? 0 : 1);
      if (ctrl === controller && source.gamepad && source.gamepad.hapticActuators && source.gamepad.hapticActuators[0]) {
        source.gamepad.hapticActuators[0].pulse(intensity, duration);
      }
    }
  }

  const player = new THREE.Group();
  player.add(camera);
  scene.add(player);

  scene.add(new THREE.AmbientLight(0xffffff, 0.6));
  const sun = new THREE.DirectionalLight(0xffffff, 1.0);
  sun.position.set(2, 4, 2);
  scene.add(sun);

  const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(10,10),
    new THREE.MeshStandardMaterial({ color: 0x111122 })
  );
  floor.rotation.x = -Math.PI/2;
  scene.add(floor);
  scene.add(new THREE.GridHelper(10, 20, 0x223344, 0x1a2233));

  // Diorama
  const diorama = new THREE.Group();
  diorama.position.set(0, 1.4, -0.8);
  scene.add(diorama);

  const CUBE_SIZE = 0.8;
  diorama.add(new THREE.LineSegments(
    new THREE.EdgesGeometry(new THREE.BoxGeometry(CUBE_SIZE, CUBE_SIZE, CUBE_SIZE)),
    new THREE.LineBasicMaterial({ color: 0x4fc3f7, transparent: true, opacity: 0.8 })
  ));
  diorama.add(new THREE.Mesh(
    new THREE.BoxGeometry(CUBE_SIZE, CUBE_SIZE, CUBE_SIZE),
    new THREE.MeshStandardMaterial({ color: 0x4fc3f7, transparent: true, opacity: 0.07, side: THREE.DoubleSide, depthWrite: false })
  ));

  // Charges
  const charges = [];
  const MAX_POS = 2, MAX_NEG = 2;
  const chargeWorldPos = new THREE.Vector3();

  function countActive(type) {
    return charges.filter(c => c.type === type && !c.fading).length;
  }

  function makeChargeLabel(type, magnitude) {
    const canvas = document.createElement('canvas');
    canvas.width = 180; canvas.height = 80;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, 180, 80);
    const text = (type > 0 ? '+' : '−') + magnitude + 'q';
    const bgColor = type > 0 ? '#cc2222' : '#2255cc';
    // Background pill
    ctx.fillStyle = bgColor;
    ctx.beginPath();
    ctx.roundRect(0, 0, 180, 80, 20);
    ctx.fill();
    // White text
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 52px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(text, 90, 42);
    return new THREE.CanvasTexture(canvas);
  }

  function spawnCharge(type) {
    if (type > 0 && countActive(1)  >= MAX_POS) return;
    if (type < 0 && countActive(-1) >= MAX_NEG) return;
    const color    = type > 0 ? 0xff4444 : 0x44aaff;
    const emissive = type > 0 ? 0xff2222 : 0x2266ff;
    const mat = new THREE.MeshStandardMaterial({ color, emissive, emissiveIntensity: 0.5, transparent: true, opacity: 1.0 });
    const mesh = new THREE.Mesh(new THREE.SphereGeometry(0.09, 32, 32), mat);
    mesh.position.set((Math.random()-.5)*.3, (Math.random()-.5)*.3, (Math.random()-.5)*.3);
    diorama.add(mesh);
    // Charge label
    const labelMat = new THREE.MeshBasicMaterial({ map: makeChargeLabel(type, 1), transparent: true, depthTest: false, side: THREE.DoubleSide });
    const labelMesh = new THREE.Mesh(new THREE.PlaneGeometry(0.14, 0.06), labelMat);
    mesh.add(labelMesh);
    const light = new THREE.PointLight(type > 0 ? 0xff4444 : 0x4488ff, 1.0, 2.5);
    diorama.add(light);
    charges.push({ mesh, light, labelMesh, labelMat, type, magnitude: 1, fading: false, velocity: new THREE.Vector3(), life: 1.0, grabbed: false, snapped: false });
    updateButtons();
    // Sound: high pop for positive, low pop for negative
    playPop(type > 0 ? 880 : 220, 0.25);
  }

  function removeCharge(ch) {
    if (ch.labelMat.map) ch.labelMat.map.dispose();
    scene.remove(ch.mesh);
    diorama.remove(ch.mesh);
    scene.remove(ch.light);
    diorama.remove(ch.light);
    charges.splice(charges.indexOf(ch), 1);
    updateButtons();
  }

  // Arrows
  function makeArrow() {
    const group = new THREE.Group();
    const mat = new THREE.MeshStandardMaterial({ color: 0x4fc3f7, emissive: 0x4fc3f7, emissiveIntensity: 0.3 });
    const shaft = new THREE.Mesh(new THREE.CylinderGeometry(0.006,0.006,0.18,8), mat.clone());
    shaft.position.y = 0.09; group.add(shaft);
    const head = new THREE.Mesh(new THREE.ConeGeometry(0.02,0.06,8), mat.clone());
    head.position.y = 0.21; group.add(head);
    return group;
  }

  const GRID=3, halfSize=CUBE_SIZE/2, step=CUBE_SIZE/(GRID+1);
  const faceConfigs = [
    { normal: new THREE.Vector3( 1,0,0), up: new THREE.Vector3(0,1,0), right: new THREE.Vector3(0,0,-1) },
    { normal: new THREE.Vector3(-1,0,0), up: new THREE.Vector3(0,1,0), right: new THREE.Vector3(0,0, 1) },
    { normal: new THREE.Vector3(0, 1,0), up: new THREE.Vector3(0,0,-1), right: new THREE.Vector3(1,0,0) },
    { normal: new THREE.Vector3(0,-1,0), up: new THREE.Vector3(0,0, 1), right: new THREE.Vector3(1,0,0) },
    { normal: new THREE.Vector3(0,0, 1), up: new THREE.Vector3(0,1,0), right: new THREE.Vector3(1,0,0) },
    { normal: new THREE.Vector3(0,0,-1), up: new THREE.Vector3(0,1,0), right: new THREE.Vector3(-1,0,0) },
  ];
  const faceArrows = [];
  faceConfigs.forEach(({ normal, up, right }) => {
    for (let i=1; i<=GRID; i++) for (let j=1; j<=GRID; j++) {
      const u=(i-(GRID+1)/2)*step, v=(j-(GRID+1)/2)*step;
      const localPos = normal.clone().multiplyScalar(halfSize).addScaledVector(up,u).addScaledVector(right,v);
      const arrow = makeArrow();
      diorama.add(arrow);
      faceArrows.push({ mesh: arrow, localPos });
    }
  });

  const _up = new THREE.Vector3(0,1,0);
  const _localPos = new THREE.Vector3();

  function updateArrows() {
    const activeSources = charges.filter(c => !c.fading).map(c => {
      c.mesh.getWorldPosition(chargeWorldPos);
      return { pos: diorama.worldToLocal(chargeWorldPos.clone()), type: c.type, magnitude: c.magnitude };
    });

    charges.forEach(c => {
      c.mesh.getWorldPosition(chargeWorldPos);
      c.light.position.copy(diorama.worldToLocal(chargeWorldPos.clone()));
    });

    // Hide all arrows when no charges
    if (activeSources.length === 0) {
      faceArrows.forEach(({ mesh }) => { mesh.visible = false; });
      return;
    }

    faceArrows.forEach(({ mesh, localPos }) => {
      mesh.visible = true;
      mesh.position.copy(localPos);

      // Superposition
      const efield = new THREE.Vector3();
      activeSources.forEach(({ pos, type, magnitude }) => {
        const r = localPos.clone().sub(pos);
        const dist = r.length();
        if (dist < 0.01) return;
        efield.add(r.normalize().multiplyScalar(type * magnitude / (dist * dist)));
      });

      const magnitude = efield.length();
      if (magnitude < 0.001) { mesh.visible = false; return; }

      const dir = efield.clone().normalize();
      const strength = Math.min(1.0, magnitude * 0.04);
      mesh.scale.setScalar(0.6 + strength * 2.2);
      const intensity = Math.min(1.0, strength * 3);
      mesh.children.forEach(child => {
        child.material.emissiveIntensity = 0.5 + intensity * 1.5;
        child.material.color.setRGB(intensity*0.1, intensity*0.8+0.5, 1.0);
      });
      mesh.setRotationFromQuaternion(new THREE.Quaternion().setFromUnitVectors(_up, dir));
    });
  }

  // Labels removed — controls explained in README / onboarding
  function updateButtons() { /* no-op — labels removed */ }

  // ── Controllers ────────────────────────────────────────────────────────────
  const GRAB_RADIUS = 0.5;
  const THROW_THRESHOLD = 0.018;
  const raycaster = new THREE.Raycaster();
  const controllers = [];
  const ctrlState = [
    { grabbing: null, prevPos: new THREE.Vector3(), currPos: new THREE.Vector3(), vel: new THREE.Vector3() },
    { grabbing: null, prevPos: new THREE.Vector3(), currPos: new THREE.Vector3(), vel: new THREE.Vector3() },
  ];
  let spinController = null;
  const spinPrevPos = new THREE.Vector3(), spinCurrPos = new THREE.Vector3();

  for (let i=0; i<2; i++) {
    const ctrl = renderer.xr.getController(i);
    const state = ctrlState[i];
    player.add(ctrl);
    controllers.push(ctrl);



    // Ray pointer
    const ray = new THREE.Line(
      new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0), new THREE.Vector3(0,0,-1)]),
      new THREE.LineBasicMaterial({ color: 0x4fc3f7, transparent: true, opacity: 0.4 })
    );
    ray.scale.z = 2;
    ctrl.add(ray);

    ctrl.addEventListener('selectstart', () => {
      // Dismiss help screen first if visible
      if (helpVisible) { hideHelp(); return; }

      // Check panel interaction first
      const hit = getPanelIntersect(ctrl);
      if (hit) {
        const action = getPanelAction(hit.uv);
        if (action === 'drag') {
          panelDragging = true; panelDragCtrl = ctrl;
          ctrl.getWorldPosition(_panelTmp);
          panelDragOffset.copy(panelMesh.position).sub(_panelTmp);
        } else if (action === 'snap') {
          snapMode = !snapMode;
          if (!snapMode) snapDots.forEach(d => { d.visible = false; });
          drawPanel();
        } else if (action === 'reset') {
          resetDioramaPosition();
        } else if (action === 'help') {
          showHelp();
        }
        return;
      }

      if (state.grabbing) return;
      ctrl.getWorldPosition(state.currPos);

      // Grab closest charge
      let closest = null, closestDist = GRAB_RADIUS;
      charges.forEach(ch => {
        if (ch.fading) return;
        ch.mesh.getWorldPosition(chargeWorldPos);
        const d = state.currPos.distanceTo(chargeWorldPos);
        if (d < closestDist) { closestDist = d; closest = ch; }
      });
      if (closest) {
        state.grabbing = closest;
        closest.grabbed = true;
        closest.mesh.material.emissiveIntensity = 1.0;
        ctrl.attach(closest.mesh);
        haptic(ctrl, 0.5, 80);
        playPop(440, 0.1);
      }
    });

    ctrl.addEventListener('selectend', () => {
      // Stop panel drag
      if (panelDragging && panelDragCtrl === ctrl) {
        panelDragging = false; panelDragCtrl = null;
        return;
      }
      if (!state.grabbing) return;
      const ch = state.grabbing;
      state.grabbing = null;
      ch.grabbed = false;
      ch.snapped = false;
      ch.mesh.material.emissiveIntensity = selectedCharge === ch ? 1.2 : 0.5;
      if (state.vel.length() > THROW_THRESHOLD) {
        scene.attach(ch.mesh);
        scene.add(ch.light);
        diorama.remove(ch.light);
        ch.fading = true;
        ch.life = 1.0;
        ch.velocity.copy(state.vel).multiplyScalar(1.5);
        updateButtons();
        haptic(ctrl, 1.0, 150);
        playWhoosh();
      } else {
        // Snap on release if snap mode on and near a snap point
        if (snapMode) {
          ch.mesh.getWorldPosition(chargeWorldPos);
          const localPos = diorama.worldToLocal(chargeWorldPos.clone());
          let closestDist = SNAP_RADIUS, closestPoint = null;
          snapPoints.forEach(sp => {
            const d = localPos.distanceTo(sp);
            if (d < closestDist) { closestDist = d; closestPoint = sp; }
          });
          if (closestPoint) {
            diorama.attach(ch.mesh);
            ch.mesh.position.copy(closestPoint);
            haptic(ctrl, 0.4, 80);
          } else {
            diorama.attach(ch.mesh);
          }
        } else {
          diorama.attach(ch.mesh);
        }
      }
    });

    ctrl.addEventListener('squeezestart', () => {
      if (spinController) return;
      spinController = ctrl;
      ctrl.getWorldPosition(spinPrevPos);
    });
    ctrl.addEventListener('squeezeend', () => {
      if (spinController !== ctrl) return;
      spinController = null;
    });
  }

  function updateFading() {
    const toRemove = [];
    charges.forEach(ch => {
      if (!ch.fading) return;
      ch.life -= 0.018;
      ch.mesh.position.addScaledVector(ch.velocity, 1.0);
      ch.velocity.multiplyScalar(0.96);
      ch.mesh.material.opacity = Math.max(0, ch.life);
      ch.light.intensity = Math.max(0, ch.life);
      if (ch.life <= 0) toRemove.push(ch);
    });
    toRemove.forEach(removeCharge);
  }

  const _ctrlWP = new THREE.Vector3();
  function updateProximity() {
    charges.forEach(ch => {
      if (ch.fading || ch.grabbed) return;
      let near = false;
      controllers.forEach(ctrl => {
        ctrl.getWorldPosition(_ctrlWP);
        ch.mesh.getWorldPosition(chargeWorldPos);
        if (_ctrlWP.distanceTo(chargeWorldPos) < GRAB_RADIUS) near = true;
      });
      ch.mesh.material.emissiveIntensity = near ? 0.9 : (ch.magnitude === 2 ? 1.0 : 0.5);
    });
  }

  function updateChargeMagnitude(ch) {
    // Update label texture
    if (ch.labelMat.map) ch.labelMat.map.dispose();
    ch.labelMat.map = makeChargeLabel(ch.type, ch.magnitude);
    ch.labelMat.needsUpdate = true;
    // Keep sphere same size — label communicates magnitude
    ch.mesh.material.emissiveIntensity = ch.magnitude === 2 ? 1.0 : 0.5;
    ch.light.intensity = ch.magnitude === 2 ? 1.8 : 1.0;
    drawPanel();
  }

  // ── Swipe magnitude gesture ───────────────────────────────────────────────
  const SWIPE_THRESHOLD = 0.020;
  const SWIPE_PROX = 0.55;
  let swipeCooled = true;
  const _swipePrevPos = new THREE.Vector3();
  const _swipeCurrPos = new THREE.Vector3();
  const _swipeVel = new THREE.Vector3();
  let _swipeInitialized = false;

  function checkSwipeGesture() {
    const session = renderer.xr.getSession();
    if (!session) return;
    // Find right controller
    let rightCtrl = null;
    for (const source of session.inputSources) {
      if (source.handedness === 'right') {
        const idx = source.handedness === 'left' ? 0 : 1;
        // Use getController matched by handedness via inputSources order
        for (let i = 0; i < controllers.length; i++) {
          rightCtrl = controllers[i];
        }
        // Get position directly from the xr controller that matches right hand
        for (let i = 0; i < session.inputSources.length; i++) {
          if (session.inputSources[i] === source) {
            rightCtrl = renderer.xr.getController(i);
          }
        }
        break;
      }
    }
    if (!rightCtrl) return;

    rightCtrl.getWorldPosition(_swipeCurrPos);
    if (!_swipeInitialized) {
      _swipePrevPos.copy(_swipeCurrPos);
      _swipeInitialized = true;
      return;
    }
    _swipeVel.subVectors(_swipeCurrPos, _swipePrevPos);
    _swipePrevPos.copy(_swipeCurrPos);

    const vy = _swipeVel.y;
    if (Math.abs(vy) < SWIPE_THRESHOLD) { swipeCooled = true; return; }
    if (!swipeCooled) return;

    rightCtrl.getWorldPosition(_ctrlWP);
    charges.forEach(ch => {
      if (ch.fading || ch.grabbed) return;
      ch.mesh.getWorldPosition(chargeWorldPos);
      if (_ctrlWP.distanceTo(chargeWorldPos) > SWIPE_PROX) return;
      if (vy > SWIPE_THRESHOLD && ch.magnitude < 2) {
        ch.magnitude = 2;
        updateChargeMagnitude(ch);
        haptic(rightCtrl, 0.5, 80);
        playPop(660, 0.15);
        swipeCooled = false;
      } else if (vy < -SWIPE_THRESHOLD && ch.magnitude > 1) {
        ch.magnitude = 1;
        updateChargeMagnitude(ch);
        haptic(rightCtrl, 0.3, 60);
        playPop(330, 0.15);
        swipeCooled = false;
      }
    });
  }

  function updateControllerVelocities() {
    controllers.forEach((ctrl, i) => {
      const state = ctrlState[i];
      ctrl.getWorldPosition(state.currPos);
      state.vel.subVectors(state.currPos, state.prevPos);
      state.prevPos.copy(state.currPos);
    });
  }

  // Both grips simultaneously = reset position
  let bothGripsCooled = true;
  function checkBothGrips() {
    const session = renderer.xr.getSession();
    if (!session) return;
    let gripsPressed = 0;
    for (const source of session.inputSources) {
      if (!source.gamepad) continue;
      const squeeze = source.gamepad.buttons[1];
      if (squeeze && squeeze.pressed) gripsPressed++;
    }
    if (gripsPressed >= 2 && bothGripsCooled) {
      resetDioramaPosition();
      bothGripsCooled = false;
    }
    if (gripsPressed === 0) bothGripsCooled = true;
  }

  function updateSpin() {
    if (!spinController) return;
    spinController.getWorldPosition(spinCurrPos);
    const delta = spinCurrPos.clone().sub(spinPrevPos);

    // Trackball rotation — axis is perpendicular to the swipe in camera space
    // This feels like rolling a physical ball with your hand
    const swipeMag = Math.sqrt(delta.x * delta.x + delta.y * delta.y);
    if (swipeMag > 0.0001) {
      // Get camera's right and up vectors in world space
      const camRight = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
      const camUp    = new THREE.Vector3(0, 1, 0).applyQuaternion(camera.quaternion);
      // Rotation axis = perpendicular to swipe direction in camera plane
      const axis = new THREE.Vector3()
        .addScaledVector(camUp,    delta.x)   // swipe right → rotate around up
        .addScaledVector(camRight, -delta.y)  // swipe up → rotate around right
        .normalize();
      const angle = swipeMag * 3.0;
      const q = new THREE.Quaternion().setFromAxisAngle(axis, angle);
      diorama.quaternion.premultiply(q);
    }
    spinPrevPos.copy(spinCurrPos);
  }

  // ── A/B button spawning ───────────────────────────────────────────────────
  let aCooled = true, bCooled = true;

  function handleSpawnButtons() {
    const session = renderer.xr.getSession();
    if (!session) return;
    for (const source of session.inputSources) {
      if (!source.gamepad || source.handedness !== 'right') continue;
      const btns = source.gamepad.buttons;
      const aPressed = btns[4] && btns[4].pressed;
      const bPressed = btns[5] && btns[5].pressed;
      if (aPressed && aCooled) { spawnCharge(1);  aCooled = false; }
      if (!aPressed) aCooled = true;
      if (bPressed && bCooled) { spawnCharge(-1); bCooled = false; }
      if (!bPressed) bCooled = true;
    }
  }

  const SNAP_ANGLE = Math.PI/6;
  let snapCooled = true;
  const moveDir = new THREE.Vector3(), camDir = new THREE.Vector3();

  function handleLocomotion() {
    const session = renderer.xr.getSession();
    if (!session) return;
    for (const source of session.inputSources) {
      if (!source.gamepad) continue;
      const axes = source.gamepad.axes;
      const sx = axes[2] !== undefined ? axes[2] : axes[0];
      const sy = axes[3] !== undefined ? axes[3] : axes[1];
      if (source.handedness === 'left') {
        if (Math.abs(sx)>0.15 || Math.abs(sy)>0.15) {
          camera.getWorldDirection(camDir); camDir.y=0; camDir.normalize();
          const right = new THREE.Vector3().crossVectors(camDir, new THREE.Vector3(0,1,0));
          moveDir.set(0,0,0).addScaledVector(camDir,-sy*0.025).addScaledVector(right,sx*0.025);
          player.position.add(moveDir);
        }
      }
      if (source.handedness === 'right') {
        if (Math.abs(sx)>0.5 && snapCooled) { player.rotation.y -= Math.sign(sx)*SNAP_ANGLE; snapCooled=false; }
        if (Math.abs(sx)<0.2) snapCooled=true;
      }
    }
  }

  // ── Position Reset ────────────────────────────────────────────────────────
  function resetDioramaPosition() {
    const camPos = new THREE.Vector3();
    const camDir = new THREE.Vector3();
    camera.getWorldPosition(camPos);
    camera.getWorldDirection(camDir);
    camDir.y = 0;
    camDir.normalize();
    // Place cube 1 meter in front, slightly below eye level
    diorama.position.copy(camPos)
      .addScaledVector(camDir, 1.0)
      .add(new THREE.Vector3(0, -0.2, 0));
    diorama.quaternion.identity();
    // Move panel to right of cube
    panelMesh.position.copy(camPos)
      .addScaledVector(camDir, 1.0)
      .add(new THREE.Vector3(0.4, -0.1, 0));
    // Buzz both controllers
    controllers.forEach(ctrl => haptic(ctrl, 0.4, 100));
  }

  // Auto-show help when VR session starts
  renderer.xr.addEventListener('sessionstart', () => {
    setTimeout(() => { resetDioramaPosition(); showHelp(); }, 500);
  });

  // ── Snap system ───────────────────────────────────────────────────────────
  let snapMode = false;
  const _h = CUBE_SIZE / 2;
  const _out = 0.85; // outside snap distance from center
  const snapPoints = [
    // Center
    new THREE.Vector3(0,0,0),
    // Corners (inside)
    new THREE.Vector3(-_h,-_h,-_h), new THREE.Vector3(-_h,-_h, _h),
    new THREE.Vector3(-_h, _h,-_h), new THREE.Vector3(-_h, _h, _h),
    new THREE.Vector3( _h,-_h,-_h), new THREE.Vector3( _h,-_h, _h),
    new THREE.Vector3( _h, _h,-_h), new THREE.Vector3( _h, _h, _h),
    // Face centers (inside)
    new THREE.Vector3(-_h, 0, 0),   new THREE.Vector3( _h, 0, 0),
    new THREE.Vector3( 0,-_h, 0),   new THREE.Vector3( 0, _h, 0),
    new THREE.Vector3( 0, 0,-_h),   new THREE.Vector3( 0, 0, _h),
    // Outside face centers
    new THREE.Vector3(-_out, 0, 0), new THREE.Vector3( _out, 0, 0),
    new THREE.Vector3( 0,-_out, 0), new THREE.Vector3( 0, _out, 0),
    new THREE.Vector3( 0, 0,-_out), new THREE.Vector3( 0, 0, _out),
  ];
  const SNAP_RADIUS = 0.18;
  const snapDotMat = new THREE.MeshBasicMaterial({ color: 0xffdd00, transparent: true, opacity: 0.7 });

  function makeSnapPlus() {
    const group = new THREE.Group();
    const bar1 = new THREE.Mesh(new THREE.BoxGeometry(0.03, 0.004, 0.004), snapDotMat);
    const bar2 = new THREE.Mesh(new THREE.BoxGeometry(0.004, 0.03, 0.004), snapDotMat);
    const bar3 = new THREE.Mesh(new THREE.BoxGeometry(0.004, 0.004, 0.03), snapDotMat);
    group.add(bar1); group.add(bar2); group.add(bar3);
    return group;
  }

  const snapDots = snapPoints.map(p => {
    const plus = makeSnapPlus();
    plus.position.copy(p); plus.visible = false;
    diorama.add(plus); return plus;
  });

  function updateSnapDots() {
    snapDots.forEach(d => { d.visible = snapMode; });
  }

  function checkSnap() {
    if (!snapMode) return;
    charges.forEach(ch => {
      if (!ch.grabbed) return;
      ch.mesh.getWorldPosition(chargeWorldPos);
      const localPos = diorama.worldToLocal(chargeWorldPos.clone());
      let closestDist = SNAP_RADIUS, closestPoint = null;
      snapPoints.forEach(sp => {
        const d = localPos.distanceTo(sp);
        if (d < closestDist) { closestDist = d; closestPoint = sp; }
      });
      if (closestPoint) {
        if (ch.mesh.parent !== diorama) diorama.attach(ch.mesh);
        ch.mesh.position.copy(closestPoint);
        if (!ch.snapped) { haptic(controllers[0], 0.3, 50); haptic(controllers[1], 0.3, 50); ch.snapped = true; }
      } else { ch.snapped = false; }
    });
  }

  // ── Passive ray selection ─────────────────────────────────────────────────
  let selectedCharge = null;
  const _raySelOrigin = new THREE.Vector3();
  const _raySelDir = new THREE.Vector3();
  const _raySelCaster = new THREE.Raycaster();
  _raySelCaster.params.Line = { threshold: 0.05 };

  function updateRaySelection() {
    const session = renderer.xr.getSession();
    if (!session) return;
    const ctrl = controllers[1];
    if (!ctrl) return;
    ctrl.getWorldPosition(_raySelOrigin);
    const wq = new THREE.Quaternion();
    ctrl.getWorldQuaternion(wq);
    _raySelDir.set(0, 0, -1).applyQuaternion(wq);
    _raySelCaster.set(_raySelOrigin, _raySelDir);
    const meshes = charges.filter(c => !c.fading && !c.grabbed).map(c => c.mesh);
    const hits = _raySelCaster.intersectObjects(meshes);
    if (hits.length > 0) {
      const ch = charges.find(c => c.mesh === hits[0].object);
      if (ch && ch !== selectedCharge) {
        // New charge hit — switch selection
        if (selectedCharge) selectedCharge.mesh.material.emissiveIntensity = 0.5;
        selectedCharge = ch;
        ch.mesh.material.emissiveIntensity = 1.2;
        drawPanel();
      }
      // If same charge hit, do nothing — keeps selection stable
    }
    // No hit — keep current selection (sticky)
  }

  // ── Flux calculation ──────────────────────────────────────────────────────
  const EPSILON_0 = 8.854e-12;
  const Q_BASE = 1e-9; // 1 nC per unit charge

  function getChargeEnclosedFraction(ch) {
    if (ch.fading) return 0;
    // Get position in diorama local space regardless of whether grabbed
    ch.mesh.getWorldPosition(chargeWorldPos);
    const pos = diorama.worldToLocal(chargeWorldPos.clone());
    const h = CUBE_SIZE / 2;
    const tol = 0.01;

    const onFaceX = Math.abs(Math.abs(pos.x) - h) < tol;
    const onFaceY = Math.abs(Math.abs(pos.y) - h) < tol;
    const onFaceZ = Math.abs(Math.abs(pos.z) - h) < tol;
    const insideX = Math.abs(pos.x) < h + tol;
    const insideY = Math.abs(pos.y) < h + tol;
    const insideZ = Math.abs(pos.z) < h + tol;

    if (!insideX || !insideY || !insideZ) return 0;

    const facesOn = (onFaceX ? 1 : 0) + (onFaceY ? 1 : 0) + (onFaceZ ? 1 : 0);
    if (facesOn === 3) return 1/8;
    if (facesOn === 2) return 1/4;
    if (facesOn === 1) return 1/2;
    return 1;
  }

  function calculateFlux() {
    let totalQ = 0;
    charges.forEach(ch => {
      const fraction = getChargeEnclosedFraction(ch);
      totalQ += ch.type * ch.magnitude * fraction;
    });
    return (totalQ * Q_BASE) / EPSILON_0;
  }

  function formatFlux(flux) {
    const abs = Math.abs(flux);
    if (abs < 0.01) return '0';
    return flux.toFixed(1);
  }
  const PANEL_W = 0.30, PANEL_H = 0.28;
  const PCV_W = 600, PCV_H = 460;
  const panelCanvas = document.createElement('canvas');
  panelCanvas.width = PCV_W; panelCanvas.height = PCV_H;
  const panelCtx = panelCanvas.getContext('2d');
  const panelTex = new THREE.CanvasTexture(panelCanvas);
  const panelMesh = new THREE.Mesh(
    new THREE.PlaneGeometry(PANEL_W, PANEL_H),
    new THREE.MeshBasicMaterial({ map: panelTex, transparent: true, side: THREE.DoubleSide })
  );
  panelMesh.position.set(0.55, 1.4, -0.8);
  scene.add(panelMesh);

  function rr(ctx, x, y, w, h, r, fill, stroke) {
    ctx.beginPath(); ctx.roundRect(x, y, w, h, r);
    if (fill) ctx.fill(); if (stroke) ctx.stroke();
  }

  function drawPanel() {
    const ctx = panelCtx;
    ctx.clearRect(0, 0, PCV_W, PCV_H);
    ctx.fillStyle = 'rgba(8,12,28,0.96)';
    rr(ctx, 0, 0, PCV_W, PCV_H, 18, true, false);
    ctx.strokeStyle = '#4fc3f7'; ctx.lineWidth = 4;
    rr(ctx, 2, 2, PCV_W-4, PCV_H-4, 16, false, true);

    // Title / drag handle
    ctx.fillStyle = '#0d2035';
    rr(ctx, 6, 6, PCV_W-12, 70, [14,14,0,0], true, false);
    ctx.fillStyle = '#4fc3f7'; ctx.font = 'bold 26px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('⚙ Controls  ⠿', PCV_W/2, 42);

    // Snap button
    ctx.fillStyle = snapMode ? '#005522' : '#1a2a3a';
    rr(ctx, 14, 88, PCV_W-28, 80, 10, true, false);
    ctx.strokeStyle = snapMode ? '#00ee77' : '#336688'; ctx.lineWidth = 2;
    rr(ctx, 14, 88, PCV_W-28, 80, 10, false, true);
    ctx.fillStyle = snapMode ? '#00ee77' : '#7799aa';
    ctx.font = 'bold 24px sans-serif';
    ctx.fillText('SNAP  ' + (snapMode ? '● ON' : '○ OFF'), PCV_W/2, 128);

    // Recenter button
    ctx.fillStyle = '#18102a';
    rr(ctx, 14, 182, PCV_W-28, 80, 10, true, false);
    ctx.strokeStyle = '#9966ff'; ctx.lineWidth = 2;
    rr(ctx, 14, 182, PCV_W-28, 80, 10, false, true);
    ctx.fillStyle = '#aa77ff'; ctx.font = 'bold 22px sans-serif';
    ctx.fillText('⟳  RECENTER', PCV_W/2, 222);

    // Flux display
    const flux = calculateFlux();
    ctx.fillStyle = '#0a1a0a';
    rr(ctx, 14, 276, PCV_W-28, 80, 10, true, false);
    ctx.strokeStyle = '#44ff88'; ctx.lineWidth = 2;
    rr(ctx, 14, 276, PCV_W-28, 80, 10, false, true);
    ctx.fillStyle = '#44ff88'; ctx.font = 'bold 28px sans-serif';
    ctx.fillText('Φ = ' + formatFlux(flux) + ' N·m²/C', PCV_W/2, 316);

    // Help button
    ctx.fillStyle = '#1a1a2a';
    rr(ctx, 14, 370, PCV_W-28, 70, 10, true, false);
    ctx.strokeStyle = '#ffcc44'; ctx.lineWidth = 2;
    rr(ctx, 14, 370, PCV_W-28, 70, 10, false, true);
    ctx.fillStyle = '#ffcc44'; ctx.font = 'bold 22px sans-serif';
    ctx.fillText('?  HELP', PCV_W/2, 405);

    panelTex.needsUpdate = true;
  }
  drawPanel();

  function getPanelAction(uv) {
    const cx = uv.x * PCV_W, cy = (1 - uv.y) * PCV_H;
    if (cy >= 6   && cy <= 76  && cx >= 6  && cx <= PCV_W-6)  return 'drag';
    if (cy >= 88  && cy <= 168 && cx >= 14 && cx <= PCV_W-14) return 'snap';
    if (cy >= 182 && cy <= 262 && cx >= 14 && cx <= PCV_W-14) return 'reset';
    if (cy >= 370 && cy <= 440 && cx >= 14 && cx <= PCV_W-14) return 'help';
    return null;
  }

  let panelDragging = false, panelDragCtrl = null;
  const panelDragOffset = new THREE.Vector3();
  const _panelRayOrigin = new THREE.Vector3();
  const _panelRayDir = new THREE.Vector3();
  const _panelRaycaster = new THREE.Raycaster();
  const _panelTmp = new THREE.Vector3();

  function getPanelIntersect(ctrl) {
    ctrl.getWorldPosition(_panelRayOrigin);
    const wq = new THREE.Quaternion();
    ctrl.getWorldQuaternion(wq);
    _panelRayDir.set(0, 0, -1).applyQuaternion(wq);
    _panelRaycaster.set(_panelRayOrigin, _panelRayDir);
    const hits = _panelRaycaster.intersectObject(panelMesh);
    return hits.length > 0 ? hits[0] : null;
  }

  function updatePanel() {
    // Billboard — always face camera
    const camPos = new THREE.Vector3();
    camera.getWorldPosition(camPos);
    panelMesh.lookAt(camPos);
    // Drag — follow controller directly, no offset lag
    if (panelDragging && panelDragCtrl) {
      panelDragCtrl.getWorldPosition(_panelTmp);
      // Place panel slightly in front of controller
      const fwd = new THREE.Vector3(0, 0, -1).applyQuaternion(panelDragCtrl.quaternion);
      panelMesh.position.copy(_panelTmp).addScaledVector(fwd, 0.3);
    }
  }

  // ── Help screen ───────────────────────────────────────────────────────────
  const HELP_W = 0.55, HELP_H = 0.45;
  const HCV_W = 900, HCV_H = 740;
  const helpCanvas = document.createElement('canvas');
  helpCanvas.width = HCV_W; helpCanvas.height = HCV_H;
  const helpCtx = helpCanvas.getContext('2d');
  const helpTex = new THREE.CanvasTexture(helpCanvas);
  const helpMesh = new THREE.Mesh(
    new THREE.PlaneGeometry(HELP_W, HELP_H),
    new THREE.MeshBasicMaterial({ map: helpTex, transparent: true, side: THREE.DoubleSide, depthTest: false })
  );
  helpMesh.visible = false;
  helpMesh.renderOrder = 999;
  scene.add(helpMesh);

  function drawHelp() {
    const ctx = helpCtx;
    ctx.clearRect(0, 0, HCV_W, HCV_H);
    ctx.fillStyle = 'rgba(6,10,24,0.97)';
    ctx.beginPath(); ctx.roundRect(0, 0, HCV_W, HCV_H, 24); ctx.fill();
    ctx.strokeStyle = '#4fc3f7'; ctx.lineWidth = 4;
    ctx.beginPath(); ctx.roundRect(2, 2, HCV_W-4, HCV_H-4, 22); ctx.stroke();

    // Title
    ctx.fillStyle = '#4fc3f7'; ctx.font = 'bold 38px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('Gauss VR — Controls', HCV_W/2, 46);

    // Divider
    ctx.strokeStyle = '#223344'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(20, 76); ctx.lineTo(HCV_W-20, 76); ctx.stroke();

    const lines = [
      ['A button',    'Spawn positive charge (1q = 1 nC)'],
      ['B button',    'Spawn negative charge (−1q = −1 nC)'],
      ['Trigger',     'Grab and move a charge'],
      ['Grip',        'Spin the cube'],
      ['Swipe up',    'Swipe up thru charge → 2q'],
      ['Swipe down',  'Swipe down thru charge → 1q'],
      ['Throw',       'Remove a charge'],
    ];

    ctx.textAlign = 'left';
    lines.forEach((line, i) => {
      const y = 110 + i * 66;
      ctx.fillStyle = '#ffe066'; ctx.font = 'bold 28px sans-serif';
      ctx.fillText(line[0], 40, y);
      ctx.fillStyle = '#ffffff'; ctx.font = '25px sans-serif';
      ctx.fillText(line[1], 280, y);
    });

    // Divider before exit instruction
    ctx.strokeStyle = '#223344'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(20, HCV_H-80); ctx.lineTo(HCV_W-20, HCV_H-80); ctx.stroke();

    // Exit instruction
    ctx.fillStyle = '#ffffff'; ctx.font = 'bold 24px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Press trigger to exit', HCV_W/2, HCV_H-44);

    helpTex.needsUpdate = true;
  }
  drawHelp();

  let helpVisible = false;

  function showHelp() {
    helpVisible = true;
    helpMesh.visible = true;
    // Position centered in front of camera
    const camPos = new THREE.Vector3();
    const camDir = new THREE.Vector3();
    camera.getWorldPosition(camPos);
    camera.getWorldDirection(camDir);
    helpMesh.position.copy(camPos).addScaledVector(camDir, 1.2);
    helpMesh.lookAt(camPos);
  }

  function hideHelp() {
    helpVisible = false;
    helpMesh.visible = false;
  }

  renderer.setAnimationLoop(() => {
    updateControllerVelocities();
    handleLocomotion();
    handleSpawnButtons();
    checkBothGrips();
    checkSwipeGesture();
    updateSpin();
    updateFading();
    updateSnapDots();
    updateArrows();
    updateProximity();
    updateRaySelection();
    // Billboard charge labels toward camera
    const camWorldPos = new THREE.Vector3();
    camera.getWorldPosition(camWorldPos);
    charges.forEach(ch => {
      if (ch.labelMesh) ch.labelMesh.lookAt(camWorldPos);
    });
    drawPanel();
    updatePanel();
    renderer.render(scene, camera);
  });

  const btn = document.createElement('button');
  Object.assign(btn.style, {
    position:'absolute', bottom:'30px', left:'50%', transform:'translateX(-50%)',
    padding:'14px 32px', background:'#0d1b2a', color:'#4fc3f7',
    border:'2px solid #4fc3f7', borderRadius:'8px', fontSize:'18px',
    cursor:'pointer', letterSpacing:'1px'
  });
  btn.textContent = 'Enter VR';
  document.body.appendChild(btn);
  btn.addEventListener('click', async () => {
    if (!navigator.xr) { btn.textContent = '⚠ WebXR not available'; return; }
    const ok = await navigator.xr.isSessionSupported('immersive-vr').catch(() => false);
    if (!ok) { btn.textContent = '⚠ VR not supported'; return; }
    const session = await navigator.xr.requestSession('immersive-vr', {
      optionalFeatures: ['local-floor','bounded-floor']
    });
    renderer.xr.setSession(session);
    audioCtx.resume();
    btn.textContent = 'Exit VR';
    session.addEventListener('end', () => { btn.textContent = 'Enter VR'; });
  });

  if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');

  window.addEventListener('resize', () => {
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });
</script>
</body>
</html>
