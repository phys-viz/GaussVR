<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>VR Gauss's Law</title>
  <style>* { margin:0; padding:0; box-sizing:border-box; } body { background:#0a0a1a; overflow:hidden; }</style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a0a1a);
  const camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.01, 50);
  camera.position.set(0, 1.6, 2.5);
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(devicePixelRatio);
  renderer.setSize(innerWidth, innerHeight);
  renderer.xr.enabled = true;
  document.body.appendChild(renderer.domElement);

  // Player rig
  const player = new THREE.Group();
  player.add(camera);
  scene.add(player);

  scene.add(new THREE.AmbientLight(0xffffff, 0.6));
  const sun = new THREE.DirectionalLight(0xffffff, 1.0);
  sun.position.set(2, 4, 2);
  scene.add(sun);

  // Fixed floor
  const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(10,10),
    new THREE.MeshStandardMaterial({ color: 0x111122 })
  );
  floor.rotation.x = -Math.PI/2;
  scene.add(floor);
  scene.add(new THREE.GridHelper(10, 20, 0x223344, 0x1a2233));

  // ── Physics diorama group — everything that spins together ────────────────
  const diorama = new THREE.Group();
  diorama.position.set(0, 1.4, -0.8); // cube center in world space
  scene.add(diorama);

  // Cube (local origin = cube center)
  const CUBE_SIZE = 0.8;
  const wireframe = new THREE.LineSegments(
    new THREE.EdgesGeometry(new THREE.BoxGeometry(CUBE_SIZE, CUBE_SIZE, CUBE_SIZE)),
    new THREE.LineBasicMaterial({ color: 0x4fc3f7, transparent: true, opacity: 0.8 })
  );
  diorama.add(wireframe);
  const cubeFaces = new THREE.Mesh(
    new THREE.BoxGeometry(CUBE_SIZE, CUBE_SIZE, CUBE_SIZE),
    new THREE.MeshStandardMaterial({ color: 0x4fc3f7, transparent: true, opacity: 0.07, side: THREE.DoubleSide, depthWrite: false })
  );
  diorama.add(cubeFaces);

  // Charge (local to diorama)
  const chargeMat = new THREE.MeshStandardMaterial({ color: 0xff4444, emissive: 0xff2222, emissiveIntensity: 0.4 });
  const charge = new THREE.Mesh(new THREE.SphereGeometry(0.09, 32, 32), chargeMat);
  charge.position.set(0, 0, 0); // start at cube center
  diorama.add(charge);
  const chargeLight = new THREE.PointLight(0xff4444, 1.2, 3);
  diorama.add(chargeLight);

  // Arrows
  function makeArrow() {
    const group = new THREE.Group();
    const mat = new THREE.MeshStandardMaterial({ color: 0x4fc3f7, emissive: 0x4fc3f7, emissiveIntensity: 0.3 });
    const shaft = new THREE.Mesh(new THREE.CylinderGeometry(0.006, 0.006, 0.18, 8), mat.clone());
    shaft.position.y = 0.09;
    group.add(shaft);
    const head = new THREE.Mesh(new THREE.ConeGeometry(0.02, 0.06, 8), mat.clone());
    head.position.y = 0.21;
    group.add(head);
    return group;
  }

  const GRID = 3;
  const halfSize = CUBE_SIZE / 2;
  const step = CUBE_SIZE / (GRID + 1);
  const faceConfigs = [
    { normal: new THREE.Vector3( 1,0,0), up: new THREE.Vector3(0,1,0), right: new THREE.Vector3(0,0,-1) },
    { normal: new THREE.Vector3(-1,0,0), up: new THREE.Vector3(0,1,0), right: new THREE.Vector3(0,0, 1) },
    { normal: new THREE.Vector3(0, 1,0), up: new THREE.Vector3(0,0,-1), right: new THREE.Vector3(1,0,0) },
    { normal: new THREE.Vector3(0,-1,0), up: new THREE.Vector3(0,0, 1), right: new THREE.Vector3(1,0,0) },
    { normal: new THREE.Vector3(0,0, 1), up: new THREE.Vector3(0,1,0), right: new THREE.Vector3(1,0,0) },
    { normal: new THREE.Vector3(0,0,-1), up: new THREE.Vector3(0,1,0), right: new THREE.Vector3(-1,0,0) },
  ];
  const faceArrows = [];
  faceConfigs.forEach(({ normal, up, right }) => {
    for (let i = 1; i <= GRID; i++) {
      for (let j = 1; j <= GRID; j++) {
        const u = (i - (GRID+1)/2) * step;
        const v = (j - (GRID+1)/2) * step;
        const localPos = normal.clone().multiplyScalar(halfSize)
          .addScaledVector(up, u).addScaledVector(right, v);
        const arrow = makeArrow();
        diorama.add(arrow);
        faceArrows.push({ mesh: arrow, localPos });
      }
    }
  });

  const _up = new THREE.Vector3(0,1,0);
  const chargeLocalPos = new THREE.Vector3();

  function updateArrows() {
    chargeLight.position.copy(charge.position);
    chargeLocalPos.copy(charge.position); // local to diorama

    faceArrows.forEach(({ mesh, localPos }) => {
      mesh.position.copy(localPos);
      const dir = localPos.clone().sub(chargeLocalPos).normalize();
      const dist = localPos.distanceTo(chargeLocalPos);
      const strength = Math.min(1.0, 0.04 / (dist * dist));
      mesh.scale.setScalar(0.5 + strength * 1.5);
      const intensity = Math.min(1.0, strength * 3);
      mesh.children.forEach(child => {
        child.material.emissiveIntensity = 0.1 + intensity * 0.8;
        child.material.color.setRGB(intensity * 0.3 + 0.1, intensity * 0.6 + 0.3, 1.0);
      });
      const q = new THREE.Quaternion().setFromUnitVectors(_up, dir);
      mesh.setRotationFromQuaternion(q);
    });
  }
  updateArrows();

  // ── Controllers ───────────────────────────────────────────────────────────
  const CHARGE_GRAB_RADIUS = 0.5;
  const CUBE_GRAB_RADIUS   = 0.55; // just outside cube surface

  let chargeGrabController = null; // trigger grab
  let spinController       = null; // grip grab
  const spinPrevPos        = new THREE.Vector3();
  const spinCurrPos        = new THREE.Vector3();
  const ctrlPos            = new THREE.Vector3();
  const controllers        = [];

  for (let i = 0; i < 2; i++) {
    const ctrl = renderer.xr.getController(i);
    player.add(ctrl);
    controllers.push(ctrl);

    const body = new THREE.Mesh(
      new THREE.CylinderGeometry(0.012, 0.018, 0.12, 10),
      new THREE.MeshStandardMaterial({ color: 0xdddddd })
    );
    body.rotation.x = -Math.PI/2;
    ctrl.add(body);

    // ── Trigger → grab charge ──────────────────────────────────────────────
    ctrl.addEventListener('selectstart', () => {
      if (chargeGrabController) return;
      ctrl.getWorldPosition(ctrlPos);
      // Convert to diorama local space for distance check
      const localCtrl = diorama.worldToLocal(ctrlPos.clone());
      if (localCtrl.distanceTo(charge.position) < CHARGE_GRAB_RADIUS) {
        chargeGrabController = ctrl;
        chargeMat.emissiveIntensity = 1.0;
        // Attach charge to controller, but keep it in diorama when released
        ctrl.attach(charge);
      }
    });
    ctrl.addEventListener('selectend', () => {
      if (chargeGrabController !== ctrl) return;
      diorama.attach(charge);
      chargeMat.emissiveIntensity = 0.4;
      chargeGrabController = null;
    });

    // ── Grip → spin diorama ────────────────────────────────────────────────
    ctrl.addEventListener('squeezestart', () => {
      if (spinController) return;
      ctrl.getWorldPosition(ctrlPos);
      const dioramaWorldPos = new THREE.Vector3();
      diorama.getWorldPosition(dioramaWorldPos);
      if (ctrlPos.distanceTo(dioramaWorldPos) < CUBE_GRAB_RADIUS + 0.3) {
        spinController = ctrl;
        ctrl.getWorldPosition(spinPrevPos);
      }
    });
    ctrl.addEventListener('squeezeend', () => {
      if (spinController !== ctrl) return;
      spinController = null;
    });
  }

  function updateProximity() {
    if (chargeGrabController) return;
    let near = false;
    controllers.forEach(ctrl => {
      ctrl.getWorldPosition(ctrlPos);
      const localCtrl = diorama.worldToLocal(ctrlPos.clone());
      if (localCtrl.distanceTo(charge.position) < CHARGE_GRAB_RADIUS) near = true;
    });
    chargeMat.emissiveIntensity = near ? 0.9 : 0.4;
  }

  // ── Spin logic ────────────────────────────────────────────────────────────
  const dioramaWorldPos = new THREE.Vector3();

  function updateSpin() {
    if (!spinController) return;
    spinController.getWorldPosition(spinCurrPos);

    // Delta movement of hand in world space
    const delta = spinCurrPos.clone().sub(spinPrevPos);

    // Horizontal hand movement → rotate around world Y axis
    // Vertical hand movement   → rotate around world X axis (camera-relative)
    const sensitivity = 3.0;
    diorama.rotation.y += delta.x * sensitivity;
    diorama.rotation.x += delta.y * sensitivity;

    // Clamp X tilt so it doesn't flip upside down
    diorama.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, diorama.rotation.x));

    spinPrevPos.copy(spinCurrPos);
  }

  // ── Locomotion ────────────────────────────────────────────────────────────
  const SNAP_ANGLE = Math.PI / 6;
  let snapCooled = true;
  const moveDir = new THREE.Vector3();
  const camDir  = new THREE.Vector3();

  function handleLocomotion() {
    const session = renderer.xr.getSession();
    if (!session) return;
    for (const source of session.inputSources) {
      if (!source.gamepad) continue;
      const axes = source.gamepad.axes;
      const sx = axes[2] !== undefined ? axes[2] : axes[0];
      const sy = axes[3] !== undefined ? axes[3] : axes[1];

      if (source.handedness === 'left') {
        if (Math.abs(sx) > 0.15 || Math.abs(sy) > 0.15) {
          camera.getWorldDirection(camDir);
          camDir.y = 0; camDir.normalize();
          const right = new THREE.Vector3().crossVectors(camDir, new THREE.Vector3(0,1,0));
          moveDir.set(0,0,0)
            .addScaledVector(camDir, -sy * 0.025)
            .addScaledVector(right,   sx * 0.025);
          player.position.add(moveDir);
        }
      }
      if (source.handedness === 'right') {
        if (Math.abs(sx) > 0.5 && snapCooled) {
          player.rotation.y -= Math.sign(sx) * SNAP_ANGLE;
          snapCooled = false;
        }
        if (Math.abs(sx) < 0.2) snapCooled = true;
      }
    }
  }

  // Render loop
  renderer.setAnimationLoop(() => {
    handleLocomotion();
    updateSpin();
    updateArrows();
    updateProximity();
    renderer.render(scene, camera);
  });

  // VR Button
  const btn = document.createElement('button');
  Object.assign(btn.style, {
    position:'absolute', bottom:'30px', left:'50%', transform:'translateX(-50%)',
    padding:'14px 32px', background:'#0d1b2a', color:'#4fc3f7',
    border:'2px solid #4fc3f7', borderRadius:'8px', fontSize:'18px',
    cursor:'pointer', letterSpacing:'1px'
  });
  btn.textContent = 'Enter VR';
  document.body.appendChild(btn);
  btn.addEventListener('click', async () => {
    if (!navigator.xr) { btn.textContent = '⚠ WebXR not available'; return; }
    const ok = await navigator.xr.isSessionSupported('immersive-vr').catch(() => false);
    if (!ok) { btn.textContent = '⚠ VR not supported'; return; }
    const session = await navigator.xr.requestSession('immersive-vr', {
      optionalFeatures: ['local-floor', 'bounded-floor']
    });
    renderer.xr.setSession(session);
    btn.textContent = 'Exit VR';
    session.addEventListener('end', () => { btn.textContent = 'Enter VR'; });
  });

  window.addEventListener('resize', () => {
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });
</script>
</body>
</html>
